version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: erp-postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Suyash@123
      POSTGRES_DB: employee_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: erp-backend-api
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:Suyash%40123@db:5432/employee_management?schema=public
      - JWT_ACCESS_SECRET=super_secret_access_key_987654321_abcdef
      - JWT_REFRESH_SECRET=super_secret_refresh_key_123456789_xyz
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/usr/src/app/uploads

  frontend:
    build: ./frontend
    container_name: erp-frontend-app
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
